name: Dokümantasyonu Yayınla (GitHub Pages)

# docs/ veya mkdocs.yml değişince MkDocs sitesini kurup GitHub Pages'e yayınlar.
on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda tek yayın; yeni push eskisini iptal etmez, sıraya alır.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Bağımlılıkları kur
        run: pip install -r requirements-docs.txt
      - name: Siteyi kur
        run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
